spring:
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:gestorgs
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  sql:
    init:
      mode: never

app:
  jwt:
    secret: ${JWT_SECRET:defaultDevSecretKeyThatIsAtLeast256BitsLongForHMACSHA256Algorithm}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  cors:
    allowed-origin: ${CORS_ORIGIN:http://localhost:5173}
  rate-limit:
    max-attempts: 5
    block-duration-minutes: 15
